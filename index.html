<!DOCTYPE html>
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  

<!-- 🔥 UPDATED ICON -->
<link rel="icon" type="image/gif" href="335420-nitro-boost-new-animated.gif">  

<title>Discord Nitro Gift</title>  

<meta property="og:title" content="You've been gifted a subscription!">  
<meta property="og:description" content="Claim your Nitro gift now. Valid for 48 hours.">  

<!-- 🔥 UPDATED OG IMAGE -->
<meta property="og:image" content="335420-nitro-boost-new-animated.gif">  

<meta name="theme-color" content="#43b581">  

<style>  
body {  
    background-color: #000;  
    margin: 0;  
    overflow: hidden;  
    font-family: 'Consolas', monospace;  
}  

canvas {  
    position: fixed;  
    top: 0;  
    left: 0;  
    z-index: 1;  
}  

/* SQUARE GLITCH */
.square{
    position:fixed;
    width:40px;
    height:40px;
    z-index:5;
    mix-blend-mode:screen;
    animation:spin 1.1s linear infinite;
}

@keyframes spin{
    0%{transform:rotate(0deg) scale(1);}
    50%{transform:rotate(180deg) scale(1.4);}
    100%{transform:rotate(360deg) scale(1);}
}

/* ADS */
.ad-popup {  
    position: fixed;  
    z-index: 1000;  
    background: #000;  
    border: 2px solid #43b581;  
    box-shadow: 0 0 20px rgba(67, 181, 129, 0.5);  
    animation: popIn 0.3s ease;  
}  

@keyframes popIn {  
    from { transform: scale(0); opacity: 0; }  
    to { transform: scale(1); opacity: 1; }  
}  

.virus-warning{
    position:fixed;
    top:15%;
    width:100%;
    text-align:center;
    color:red;
    font-size:3rem;
    font-weight:bold;
    text-shadow:0 0 15px red;
    z-index:9999;
    display:none;
    animation:flash 0.4s infinite;
}

@keyframes flash{
    0%,100%{opacity:1;}
    50%{opacity:0;}
}
</style>  
</head>  

<body>  

<audio id="bgMusic" loop>
    <source src="/virus.mp3" type="audio/mpeg">
</audio>

<canvas id="binaryCanvas"></canvas>  

<div class="virus-warning" id="virusText">⚠️ VIRUS DETECTED ⚠️</div>

<div id="adLayer"></div>  

<script>  

window.addEventListener("click", ()=>{
    const m=document.getElementById("bgMusic");
    m.volume=1;
    m.play();

    startVoiceWarning();
    startSquares();
});

/* VOICE */
function startVoiceWarning(){
    const msg=new SpeechSynthesisUtterance();
    msg.text="Warning. System infected. Virus detected.";
    msg.rate=0.85;
    msg.pitch=0.7;
    speechSynthesis.speak(msg);

    document.getElementById("virusText").style.display="block";
}

/* MATRIX */
const c=document.getElementById("binaryCanvas");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

const font=16;
const cols=c.width/font;
const drops=Array(Math.floor(cols)).fill(1);

function draw(){
    ctx.fillStyle="rgba(0,0,0,0.1)";
    ctx.fillRect(0,0,c.width,c.height);
    ctx.fillStyle="#43b581";
    ctx.font=font+"px monospace";

    for(let i=0;i<drops.length;i++){
        const t=Math.random()>0.5?"1":"0";
        ctx.fillText(t,i*font,drops[i]*font);

        if(drops[i]*font>c.height) drops[i]=0;
        drops[i]++;
    }
}
setInterval(draw,33);

/* SQUARES */
function randColor(){
    return `rgb(${Math.random()*255},${Math.random()*255},${Math.random()*255})`;
}

function spawnSquare(){
    const s=document.createElement("div");
    s.className="square";

    s.style.left=Math.random()*innerWidth+"px";
    s.style.top=Math.random()*innerHeight+"px";

    const col=randColor();
    s.style.background=col;
    s.style.boxShadow="0 0 15px "+col;

    document.body.appendChild(s);

    setInterval(()=>{
        s.style.left=(parseFloat(s.style.left)+Math.random()*25-12)+"px";
        s.style.top=(parseFloat(s.style.top)+Math.random()*25-12)+"px";
    },80);
}

function startSquares(){
    setInterval(()=>{
        for(let i=0;i<4;i++){
            spawnSquare();
        }
    },150);
}

/* ADS */
function spawnRandomAd(){
    const adWrap=document.createElement("div");
    adWrap.className="ad-popup";

    adWrap.style.top=Math.random()*(innerHeight-400)+"px";
    adWrap.style.left=Math.random()*(innerWidth-160)+"px";

    adWrap.innerHTML=`
        <div style="position:relative;">
            <iframe 
                src="https://publisher.linkvertise.com/cdn/ads/LV-160x600/index.html"
                frameborder="0"
                width="160"
                height="600">
            </iframe>
            <a href="https://publisher.linkvertise.com/ac/1058460"
               target="_blank"
               style="position:absolute;top:0;left:0;right:0;bottom:0;">
            </a>
        </div>
    `;

    document.getElementById("adLayer").appendChild(adWrap);

    setInterval(()=>{
        adWrap.style.top=(parseFloat(adWrap.style.top)+Math.random()*20-10)+"px";
        adWrap.style.left=(parseFloat(adWrap.style.left)+Math.random()*20-10)+"px";
    },120);
}

setTimeout(()=>{
    spawnRandomAd();
    spawnRandomAd();

    setInterval(()=>{
        spawnRandomAd();
    },1200);

},5000);

</script>  

</body>  
</html>
